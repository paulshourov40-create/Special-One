
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just One Moment</title>

<!-- ✅ PRELOAD IMAGES (fix slow loading) -->
<link rel="preload" as="image" href="lock.jpg">
<link rel="preload" as="image" href="her.jpg">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: black;
  color: white;
}

/* LOCK SCREEN */
#lockScreen {
  height: 100vh;
  background: url("lock.jpg") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  transition: opacity 1s ease;
}

#lockScreen input {
  width: 90%;
  max-width: 300px;
  padding: 15px;
  border-radius: 20px;
  border: 2px solid pink;
  text-align: center;
  font-size: 18px;
}

#lockScreen button {
  margin-top: 10px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: hotpink;
  color: white;
  cursor: pointer;
}

/* ✅ SURPRISE SCREEN (NOW CLEAR & FIXED) */
#surpriseScreen {
  display: none;
  min-height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url("her.jpg") center/cover no-repeat;
  padding: 20px;
}

/* MESSAGE BOX */
#message {
  max-width: 700px;
  margin: auto;
  margin-top: 10vh;
  padding: 20px;
  background: rgba(0,0,0,0.5);
  border-radius: 20px;
  font-size: 18px;
  line-height: 1.8;
  color: #ffd6e8;
}

#title {
  text-align: center;
  font-size: 32px;
  color: #ffd6e8;
  text-shadow:
    0 0 5px #ff69b4,
    0 0 10px #ff69b4,
    0 0 20px #ff1493;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from {
    text-shadow:
      0 0 5px #ff69b4,
      0 0 10px #ff69b4,
      0 0 20px #ff1493;
  }
  to {
    text-shadow:
      0 0 10px #ffd6e8,
      0 0 20px #ff69b4,
      0 0 30px #ff1493;
  }
}

/* HEART ANIMATION */
.heart {
  position: fixed;
  bottom: -50px;
  font-size: 20px;
  animation-name: float;
  animation-timing-function: linear;
  pointer-events: none;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🔒 LOCK SCREEN -->
<div id="lockScreen">
  <h2>✨ A Little Surprise ✨</h2>
  <input type="password" id="codeInput" placeholder="Enter code">
  <button onclick="unlock()">Open 💖</button>
</div>

<!-- 💖 SURPRISE SCREEN (NOW FIXED & VISIBLE) -->
<div id="surpriseScreen">
  <div id="message">
    <h1 id="title">Hey There 👋😊</h1>
    <div id="text"></div>
  </div>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const correctCode = "special one";
let heartInterval = null;

const romanticMessage = `You probably didn’t expect me to be here, but here I am. coz I wanted to try something unique for you, so I did this on my own🎩. I want to say thank you for having me in your life for the past three years and thank you as well for the lessons that helped me a lot✨. You are the purest and most genuine girl I have ever seen, and I feel truly lucky to have met someone like you⭐. The memories we created and the moments we shared will always mean a lot to me. Knowing you has shaped me in ways I will always be grateful for, and those memories will stay with me🤗. No matter how much time passes or where life takes us, you will always hold a special place in my heart🥰. I will always look back on these years with appreciation, respect, and a smile. There’s nothing more to say—just wishing you happiness, success, and all the best for the future🍀. I hope life gives you every good thing you deserve🍃.

Take care 💖`;

function typeText(text) {
  const box = document.getElementById("text");
  box.innerHTML = "";
  let i = 0;

  function typing() {
    box.innerHTML += text.charAt(i);
    i++;
    if (i < text.length) setTimeout(typing, 40);
  }
  typing();
}

function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";

  const hearts = ["💖", "💘", "💝", "❤️", "💗", "💕"];
  heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = 15 + Math.random() * 25 + "px";
  heart.style.animationDuration = 4 + Math.random() * 4 + "s";
  heart.style.opacity = Math.random();

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 8000);
}

function unlock() {
  const input = document.getElementById("codeInput").value.trim();

  if (input === correctCode) {
    const lock = document.getElementById("lockScreen");
    lock.style.opacity = "0";

    setTimeout(() => {
      lock.style.display = "none";

      const screen = document.getElementById("surpriseScreen");
      screen.style.display = "block";
      screen.style.opacity = "1";

      const music = document.getElementById("bgMusic");
      music.volume = 0.3;
      music.play().catch(() => {});

      typeText(romanticMessage);

      if (!heartInterval) {
        heartInterval = setInterval(createHeart, 500);
      }
    }, 800);
  } else {
    alert("Wrong code ❌");
  }
}
</script>

</body>
</html>
